<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codex-provider-switch Proxy Architecture</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #e5e7eb;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px;
    }

    .diagram {
      overflow-x: auto;
      border: 1px solid #1f2937;
      background: #000;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1100px;
      background: #000;
    }

    .notes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .note {
      border: 1px solid #1f2937;
      background: #050505;
      padding: 14px 16px;
    }

    .note h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #f9fafb;
    }

    .note p {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="diagram">
      <svg viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
        <title id="title">codex-provider-switch proxy 模式架构图</title>
        <desc id="desc">多个 Codex 进程都访问本地 cps proxy，proxy 每次请求读取当前 provider 配置，再转发到已激活的 OpenAI-compatible provider。</desc>

        <defs>
          <style>
            .font { font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
            .mono { font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace; }
            .title { fill: #f9fafb; font-size: 30px; font-weight: 800; }
            .subtitle { fill: #9ca3af; font-size: 15px; }
            .section { fill: #e5e7eb; font-size: 17px; font-weight: 800; }
            .label { fill: #f9fafb; font-size: 15px; font-weight: 800; }
            .small { fill: #9ca3af; font-size: 12px; }
            .tiny { fill: #6b7280; font-size: 11px; }
            .cmd { fill: #f9fafb; font-size: 13px; font-weight: 700; }
          </style>

          <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
            <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#111827" stroke-width="0.7"/>
          </pattern>

          <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <marker id="arrow-cyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M 0 1 L 11 6 L 0 11 Z" fill="#22d3ee"/>
          </marker>
          <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M 0 1 L 11 6 L 0 11 Z" fill="#34d399"/>
          </marker>
          <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M 0 1 L 11 6 L 0 11 Z" fill="#a78bfa"/>
          </marker>
          <marker id="arrow-rose" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M 0 1 L 11 6 L 0 11 Z" fill="#fb7185"/>
          </marker>
          <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M 0 1 L 11 6 L 0 11 Z" fill="#f59e0b"/>
          </marker>
        </defs>

        <rect width="1280" height="820" fill="#000"/>
        <rect width="1280" height="820" fill="url(#grid)" opacity="0.85"/>

        <text x="56" y="58" class="font title">cps Proxy 模式：Codex 只认本地代理，Provider 可以热切换</text>
        <text x="58" y="90" class="font subtitle">首次 setup 后，Codex 进程统一请求 127.0.0.1:17888；之后 cps use 只更新 activeProvider，新请求立即走新的上游。</text>

        <!-- Codex process group -->
        <rect x="56" y="130" width="286" height="276" rx="18" fill="#020617" stroke="#22d3ee" stroke-width="2"/>
        <text x="82" y="166" class="font section" fill="#67e8f9">多个 Codex 进程</text>
        <text x="82" y="190" class="font small">CLI / App / IDE 都只连本地地址</text>

        <rect x="88" y="220" width="222" height="46" rx="12" fill="#071827" stroke="#155e75"/>
        <circle cx="112" cy="243" r="6" fill="#22d3ee"/>
        <text x="132" y="248" class="font label">codex 终端 A</text>

        <rect x="88" y="282" width="222" height="46" rx="12" fill="#071827" stroke="#155e75"/>
        <circle cx="112" cy="305" r="6" fill="#22d3ee"/>
        <text x="132" y="310" class="font label">Codex App</text>

        <rect x="88" y="344" width="222" height="36" rx="12" fill="#071827" stroke="#155e75"/>
        <text x="112" y="367" class="font label">其他已启动会话...</text>

        <!-- Local files -->
        <rect x="56" y="462" width="286" height="164" rx="18" fill="#06020f" stroke="#8b5cf6" stroke-width="1.7"/>
        <text x="82" y="498" class="font section" fill="#c4b5fd">Codex 本地配置</text>
        <rect x="86" y="522" width="226" height="36" rx="10" fill="#1e143c" stroke="#8b5cf6"/>
        <text x="106" y="545" class="mono cmd">config.toml</text>
        <text x="206" y="545" class="font small">base_url = localhost</text>
        <rect x="86" y="572" width="226" height="36" rx="10" fill="#1e143c" stroke="#8b5cf6"/>
        <text x="106" y="595" class="mono cmd">auth.json</text>
        <text x="190" y="595" class="font small">只放占位 key</text>

        <!-- Proxy -->
        <rect x="456" y="270" width="322" height="230" rx="24" fill="#031712" stroke="#34d399" stroke-width="2.4" filter="url(#soft-glow)"/>
        <text x="500" y="320" class="font section" fill="#86efac">cps proxy 守护进程</text>
        <text x="500" y="348" class="mono small">http://127.0.0.1:17888</text>
        <line x1="500" y1="372" x2="734" y2="372" stroke="#14532d"/>
        <text x="500" y="405" class="font label">每次请求都重新读取 provider 状态</text>
        <text x="500" y="432" class="font small">选择 activeProvider，注入对应 API key</text>
        <text x="500" y="459" class="mono tiny">GET /__cps/health</text>

        <!-- Provider store -->
        <rect x="456" y="570" width="322" height="154" rx="20" fill="#130a2a" stroke="#a78bfa" stroke-width="2"/>
        <text x="500" y="610" class="font section" fill="#ddd6fe">providers.json</text>
        <text x="500" y="638" class="mono small">activeProvider = Provider B</text>
        <text x="500" y="668" class="font small">保存：名称、base_url、api_key</text>
        <text x="500" y="696" class="font tiny">示例地址已脱敏，不展示真实服务 URL</text>

        <!-- Upstreams -->
        <rect x="886" y="138" width="338" height="468" rx="22" fill="#0b0702" stroke="#f59e0b" stroke-width="2"/>
        <text x="922" y="176" class="font section" fill="#fcd34d">OpenAI-compatible 上游</text>
        <text x="922" y="200" class="font small">只有 proxy 会接触真实 key</text>

        <rect x="922" y="234" width="266" height="86" rx="16" fill="#111827" stroke="#475569" stroke-width="1.4"/>
        <text x="950" y="268" class="font label">Provider A</text>
        <text x="950" y="294" class="mono small">https://api.example.com</text>
        <text x="1124" y="268" class="font tiny">备用</text>

        <rect x="922" y="350" width="266" height="96" rx="16" fill="#241509" stroke="#f59e0b" stroke-width="2.4" filter="url(#soft-glow)"/>
        <text x="950" y="386" class="font label">Provider B</text>
        <text x="950" y="412" class="mono small">https://api.example.net</text>
        <rect x="1090" y="372" width="70" height="28" rx="14" fill="#f59e0b"/>
        <text x="1125" y="391" class="font tiny" fill="#111827" text-anchor="middle" font-weight="800">当前</text>

        <rect x="922" y="476" width="266" height="74" rx="16" fill="#111827" stroke="#475569" stroke-width="1.4"/>
        <text x="950" y="512" class="font label">Provider C</text>
        <text x="950" y="536" class="font small">按需切换</text>

        <!-- Commands -->
        <rect x="56" y="680" width="348" height="82" rx="18" fill="#1b0a05" stroke="#f59e0b" stroke-width="1.7"/>
        <text x="84" y="716" class="mono cmd">cps proxy setup --start</text>
        <text x="84" y="742" class="font small">写入本地 Codex 配置，并启动 proxy</text>

        <rect x="850" y="680" width="374" height="82" rx="18" fill="#1f0712" stroke="#fb7185" stroke-width="1.7"/>
        <text x="880" y="716" class="mono cmd">cps use Provider B</text>
        <text x="880" y="742" class="font small">只更新 providers.json，下一次请求生效</text>

        <!-- Main flow arrows -->
        <path d="M 342 268 C 398 268 398 384 456 384" fill="none" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrow-cyan)"/>
        <text x="372" y="332" class="font small">HTTP 请求</text>
        <text x="372" y="352" class="mono tiny">/responses</text>

        <path d="M 617 500 L 617 570" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrow-purple)"/>
        <text x="634" y="540" class="font small">读取当前 provider</text>

        <path d="M 778 386 C 832 386 832 398 922 398" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-green)"/>
        <text x="806" y="366" class="font small">转发请求 + 当前 key</text>

        <path d="M 404 720 C 426 720 430 600 456 600" fill="none" stroke="#f59e0b" stroke-width="2.6" stroke-dasharray="8 7" marker-end="url(#arrow-amber)"/>
        <path d="M 270 680 C 270 646 270 640 270 626" fill="none" stroke="#f59e0b" stroke-width="2.6" stroke-dasharray="8 7" marker-end="url(#arrow-amber)"/>
        <text x="332" y="660" class="font tiny" fill="#fbbf24">首次 setup</text>

        <path d="M 1036 680 C 1036 640 810 644 778 644" fill="none" stroke="#fb7185" stroke-width="2.8" stroke-dasharray="8 7" marker-end="url(#arrow-rose)"/>
        <text x="850" y="628" class="font tiny" fill="#fb7185">切换只改状态，不改 Codex 进程内存</text>

        <!-- Key idea strip -->
        <rect x="456" y="130" width="322" height="94" rx="20" fill="#050505" stroke="#374151"/>
        <text x="500" y="166" class="font label">关键点</text>
        <text x="500" y="194" class="font small">旧 Codex 进程继续请求 localhost；proxy 在请求到来时拿最新 key。</text>

        <!-- Legend -->
        <text x="56" y="804" class="font tiny">黑底手绘版架构图，已脱敏：图中 provider URL 均为 example.* 占位。</text>
      </svg>
    </main>

    <section class="notes">
      <article class="note">
        <h2>为什么能热切换</h2>
        <p>Codex 不再直接拿真实 API key 请求上游，而是固定请求本地 proxy。</p>
      </article>
      <article class="note">
        <h2>切换发生在哪里</h2>
        <p>cps use 只修改 activeProvider；proxy 每次请求都会读取最新状态。</p>
      </article>
      <article class="note">
        <h2>真实信息在哪里</h2>
        <p>真实 provider URL 和 API key 只保存在用户本机配置里，README 图里只放占位示例。</p>
      </article>
    </section>
  </div>
</body>
</html>
