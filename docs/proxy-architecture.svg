<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
        <title id="title">codex-provider-switch proxy architecture</title>
        <desc id="desc">A sanitized architecture diagram showing Codex clients, local Codex config files, cps proxy, provider store, and upstream providers.</desc>

        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
          </marker>
          <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185" />
          </marker>
          <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="1100" height="720" fill="#000000" />
        <rect width="1100" height="720" fill="url(#grid)" />

        <!-- Arrows -->
        <path d="M 210 176 L 286 176 Q 306 176 306 196 L 306 360 Q 306 380 336 380" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrowhead-cyan)"/>
        <text x="276" y="258" fill="#94a3b8" font-size="10" text-anchor="middle">HTTP /responses</text>

        <path d="M 522 360 L 588 360 Q 618 360 618 330 L 618 140 Q 618 120 660 120 L 702 120" fill="none" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrowhead-emerald)"/>
        <text x="608" y="278" fill="#94a3b8" font-size="10" text-anchor="middle">forward + active key</text>

        <path d="M 522 384 L 550 384" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrowhead-violet)"/>

        <path d="M 274 496 L 338 222" fill="none" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowhead-rose)"/>
        <text x="252" y="358" fill="#fb7185" font-size="10" text-anchor="middle">setup writes</text>

        <path d="M 274 496 L 594 496 Q 624 496 624 466" fill="none" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowhead-rose)"/>
        <text x="448" y="486" fill="#fb7185" font-size="10" text-anchor="middle">use updates</text>

        <!-- Left client group -->
        <rect x="36" y="44" width="196" height="220" rx="12" fill="rgba(8, 51, 68, 0.16)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="52" y="64" fill="#22d3ee" font-size="10" font-weight="700">Codex clients</text>

        <rect x="62" y="90" width="142" height="48" rx="6" fill="#0f172a"/>
        <rect x="62" y="90" width="142" height="48" rx="6" fill="rgba(8, 51, 68, 0.42)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="133" y="110" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">Codex CLI</text>
        <text x="133" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">terminal sessions</text>

        <rect x="62" y="150" width="142" height="48" rx="6" fill="#0f172a"/>
        <rect x="62" y="150" width="142" height="48" rx="6" fill="rgba(8, 51, 68, 0.42)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="133" y="170" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">Codex App</text>
        <text x="133" y="186" fill="#94a3b8" font-size="9" text-anchor="middle">desktop / app-server</text>

        <rect x="62" y="210" width="142" height="38" rx="6" fill="#0f172a"/>
        <rect x="62" y="210" width="142" height="38" rx="6" fill="rgba(8, 51, 68, 0.42)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="133" y="234" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">IDE Extension</text>

        <!-- Local config -->
        <rect x="338" y="60" width="184" height="188" rx="12" fill="rgba(76, 29, 149, 0.13)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="354" y="80" fill="#a78bfa" font-size="10" font-weight="700">Local Codex files</text>

        <rect x="364" y="106" width="132" height="54" rx="6" fill="#0f172a"/>
        <rect x="364" y="106" width="132" height="54" rx="6" fill="rgba(76, 29, 149, 0.42)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="430" y="127" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">config.toml</text>
        <text x="430" y="143" fill="#94a3b8" font-size="8" text-anchor="middle">base_url localhost</text>

        <rect x="364" y="176" width="132" height="54" rx="6" fill="#0f172a"/>
        <rect x="364" y="176" width="132" height="54" rx="6" fill="rgba(76, 29, 149, 0.42)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="430" y="197" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">auth.json</text>
        <text x="430" y="213" fill="#94a3b8" font-size="8" text-anchor="middle">placeholder key</text>

        <!-- Proxy -->
        <rect x="338" y="294" width="184" height="132" rx="12" fill="#0f172a"/>
        <rect x="338" y="294" width="184" height="132" rx="12" fill="rgba(6, 78, 59, 0.42)" stroke="#34d399" stroke-width="1.5"/>
        <text x="430" y="320" fill="#f8fafc" font-size="13" font-weight="700" text-anchor="middle">cps proxy</text>
        <text x="430" y="340" fill="#94a3b8" font-size="9" text-anchor="middle">127.0.0.1:17888</text>
        <text x="430" y="360" fill="#34d399" font-size="8" text-anchor="middle">reads store per request</text>
        <text x="430" y="376" fill="#34d399" font-size="8" text-anchor="middle">injects active API key</text>
        <text x="430" y="396" fill="#94a3b8" font-size="8" text-anchor="middle">/__cps/health</text>

        <!-- Store -->
        <rect x="552" y="300" width="202" height="152" rx="12" fill="#0f172a"/>
        <rect x="552" y="300" width="202" height="152" rx="12" fill="rgba(76, 29, 149, 0.42)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="653" y="325" fill="#f8fafc" font-size="12" font-weight="700" text-anchor="middle">provider store</text>
        <text x="653" y="345" fill="#94a3b8" font-size="8" text-anchor="middle">~/.config/.../providers.json</text>
        <text x="653" y="372" fill="#a78bfa" font-size="9" text-anchor="middle">activeProvider = Provider A</text>
        <text x="653" y="394" fill="#94a3b8" font-size="8" text-anchor="middle">Provider A: api.example.com</text>
        <text x="653" y="410" fill="#94a3b8" font-size="8" text-anchor="middle">Provider B: api.example.net</text>
        <text x="653" y="426" fill="#94a3b8" font-size="8" text-anchor="middle">Provider C: api.example.org</text>

        <!-- Upstream boundary -->
        <rect x="660" y="62" width="388" height="198" rx="12" fill="rgba(120, 53, 15, 0.1)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="676" y="82" fill="#fbbf24" font-size="10" font-weight="700">OpenAI-compatible upstreams</text>

        <rect x="704" y="110" width="130" height="58" rx="6" fill="#0f172a"/>
        <rect x="704" y="110" width="130" height="58" rx="6" fill="rgba(120, 53, 15, 0.32)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="769" y="132" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">Provider A</text>
        <text x="769" y="148" fill="#94a3b8" font-size="8" text-anchor="middle">https://api.example.com</text>

        <rect x="866" y="110" width="130" height="58" rx="6" fill="#0f172a"/>
        <rect x="866" y="110" width="130" height="58" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="931" y="132" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">Provider B</text>
        <text x="931" y="148" fill="#94a3b8" font-size="8" text-anchor="middle">inactive</text>

        <rect x="866" y="188" width="130" height="44" rx="6" fill="#0f172a"/>
        <rect x="866" y="188" width="130" height="44" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="931" y="215" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">Provider C</text>

        <!-- CLI operations -->
        <rect x="64" y="452" width="420" height="144" rx="12" fill="rgba(136, 19, 55, 0.12)" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="82" y="474" fill="#fb7185" font-size="10" font-weight="700">cps commands</text>

        <rect x="90" y="504" width="170" height="44" rx="6" fill="#0f172a"/>
        <rect x="90" y="504" width="170" height="44" rx="6" fill="rgba(136, 19, 55, 0.38)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="175" y="522" fill="#f8fafc" font-size="10" font-weight="700" text-anchor="middle">cps proxy setup --start</text>
        <text x="175" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">write config + start daemon</text>

        <rect x="284" y="504" width="170" height="44" rx="6" fill="#0f172a"/>
        <rect x="284" y="504" width="170" height="44" rx="6" fill="rgba(136, 19, 55, 0.38)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="369" y="522" fill="#f8fafc" font-size="10" font-weight="700" text-anchor="middle">cps use Provider A</text>
        <text x="369" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">switch active provider</text>

        <rect x="90" y="560" width="364" height="22" rx="4" fill="rgba(251, 146, 60, 0.24)" stroke="#fb923c" stroke-width="1"/>
        <text x="272" y="575" fill="#fb923c" font-size="8" text-anchor="middle">cps proxy status / restart / stop</text>

        <!-- Runtime files -->
        <rect x="812" y="342" width="190" height="92" rx="12" fill="#0f172a"/>
        <rect x="812" y="342" width="190" height="92" rx="12" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="907" y="366" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">runtime files</text>
        <text x="907" y="388" fill="#94a3b8" font-size="8" text-anchor="middle">proxy.pid</text>
        <text x="907" y="404" fill="#94a3b8" font-size="8" text-anchor="middle">proxy.log</text>

        <line x1="754" y1="384" x2="810" y2="384" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Legend outside boundaries -->
        <text x="64" y="658" fill="#f8fafc" font-size="10" font-weight="700">Legend</text>
        <rect x="64" y="674" width="18" height="10" rx="2" fill="rgba(8, 51, 68, 0.42)" stroke="#22d3ee" stroke-width="1"/>
        <text x="90" y="682" fill="#94a3b8" font-size="8">Codex clients</text>
        <rect x="204" y="674" width="18" height="10" rx="2" fill="rgba(6, 78, 59, 0.42)" stroke="#34d399" stroke-width="1"/>
        <text x="230" y="682" fill="#94a3b8" font-size="8">Local proxy</text>
        <rect x="334" y="674" width="18" height="10" rx="2" fill="rgba(76, 29, 149, 0.42)" stroke="#a78bfa" stroke-width="1"/>
        <text x="360" y="682" fill="#94a3b8" font-size="8">Local files / store</text>
        <rect x="504" y="674" width="18" height="10" rx="2" fill="rgba(120, 53, 15, 0.32)" stroke="#fbbf24" stroke-width="1"/>
        <text x="530" y="682" fill="#94a3b8" font-size="8">Upstream provider</text>
        <line x1="704" y1="679" x2="748" y2="679" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,5" marker-end="url(#arrowhead-rose)"/>
        <text x="758" y="682" fill="#94a3b8" font-size="8">setup / switch commands</text>
      </svg>